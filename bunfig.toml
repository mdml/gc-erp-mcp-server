[install]
# Pin exact versions (no ^ or ~ prefixes)
exact = true

# Write lockfile as text for diffability and auditing
saveTextLockfile = true

# Only install package versions published at least 7 days ago.
# Excludes cover packages whose currently-locked version is fresher than
# 7 days at lockfile-creation time — Cloudflare ships ~daily and we'd
# otherwise be stuck on stale Worker types. Trim this list once the
# locked version ages out.
minimumReleaseAge = 604800
minimumReleaseAgeExcludes = [
  "@cloudflare/workers-types",
  # Clerk ships frequently — like wrangler, Clerk's releases age out of the
  # 7-day window before they stabilize. Per ADR 0012.
  "@clerk/backend",
  "@clerk/shared",
  "agents",
  "wrangler",
  # ext-apps 1.6.0 published 2026-04-14; inside the 7-day quarantine until
  # 2026-04-21. Per ADR 0014. Remove this entry on/after 2026-04-21.
  "@modelcontextprotocol/ext-apps",
]
