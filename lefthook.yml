# Lefthook — local git hooks
# Install: lefthook install (runs automatically via `prepare` on bun install)

pre-commit:
  parallel: true
  commands:
    lint:
      run: turbo run lint
    typecheck:
      run: turbo run typecheck
    code-health:
      # CLI owns the semantics — hard-fails on missing cs, missing
      # CS_ACCESS_TOKEN, unmeasured runs, or any score < 10.
      # See packages/dev-tools/src/code-health.ts.
      glob: "*.{ts,tsx,js,jsx,mjs}"
      exclude: '*.{test,spec}.{ts,tsx,js,jsx,mjs}'
      run: bun run code-health {staged_files}

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    gate:
      run: bun run gate -- --coverage
    osv-scan:
      run: osv-scanner scan --config=osv-scanner.toml --lockfile=bun.lock
